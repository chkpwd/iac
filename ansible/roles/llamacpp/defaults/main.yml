---
llamacpp_user: llamacpp
llamacpp_group: llamacpp
llamacpp_host: "0.0.0.0"
llamacpp_port: 8080

llamacpp_version: "b9592"
llamacpp_repo_url: "https://github.com/ggml-org/llama.cpp.git"

llamacpp_build_dir: "/tmp/llama.cpp"
llamacpp_install_dir: "/usr/local/bin"
llamacpp_binary_path: "{{ llamacpp_install_dir }}/llama-server"
llamacpp_home_dir: "/usr/share/llamacpp"
llamacpp_model_dir: "/usr/share/llamacpp/models"

llamacpp_model: ""
llamacpp_model_hf_repo: ""

llamacpp_mmproj: ""

llamacpp_n_gpu_layers: "all" # "all", "auto", or a layer count
llamacpp_ctx_size: 4096
llamacpp_parallel: 4
llamacpp_threads: -1

llamacpp_cuda_enabled: true
llamacpp_cuda_arch: "52"

llamacpp_models: []
llamacpp_hf_token: ""

# llama-swap: on-demand multi-model serving (replaces the single-model service)
llamacpp_swap_enabled: false
llamacpp_swap_version: "225"
llamacpp_swap_binary_path: "{{ llamacpp_install_dir }}/llama-swap"
llamacpp_swap_config_path: "/etc/llama-swap/config.yaml"
llamacpp_swap_listen: "{{ llamacpp_host }}:{{ llamacpp_port }}"
llamacpp_swap_health_timeout: 300
llamacpp_swap_log_level: "info"
llamacpp_swap_ttl: 300
llamacpp_swap_models: []
