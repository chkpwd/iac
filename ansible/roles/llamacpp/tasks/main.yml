---
- name: Install deps
  become: true
  ansible.builtin.package:
    name:
      - cmake
      - gcc
      - g++
      - git
      - pkg-config
    state: present

- name: Install NVIDIA CUDA toolkit
  become: true
  when: llamacpp_cuda_enabled | bool
  ansible.builtin.package:
    name: nvidia-cuda-toolkit
    state: present

- name: Check if llama-server is installed
  ansible.builtin.stat:
    path: "{{ llamacpp_binary_path }}"
  register: llamacpp_binary

- name: Build and install llama.cpp
  when: not llamacpp_binary.stat.exists
  block:
    - name: Clone llama.cpp at version {{ llamacpp_version }}
      become: true
      ansible.builtin.git:
        repo: "{{ llamacpp_repo_url }}"
        dest: "{{ llamacpp_build_dir }}"
        version: "{{ llamacpp_version }}"
        depth: 1
        force: true

    - name: Configure llama.cpp with CMake
      become: true
      ansible.builtin.command:
        cmd: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          {{ '-DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=' + llamacpp_cuda_arch if llamacpp_cuda_enabled | bool else '' }}
        chdir: "{{ llamacpp_build_dir }}"
        creates: "{{ llamacpp_build_dir }}/build/CMakeCache.txt"

    - name: Build llama-server
      become: true
      ansible.builtin.command:
        cmd: cmake --build build --target llama-server -j {{ ansible_processor_vcpus | default(4) }}
        chdir: "{{ llamacpp_build_dir }}"
        creates: "{{ llamacpp_build_dir }}/build/bin/llama-server"
      async: 3600
      poll: 30

    - name: Install llama-server binary
      become: true
      ansible.builtin.copy:
        remote_src: true
        src: "{{ llamacpp_build_dir }}/build/bin/llama-server"
        dest: "{{ llamacpp_binary_path }}"
        owner: root
        group: root
        mode: "0755"

  always:
    - name: Remove build directory
      become: true
      ansible.builtin.file:
        path: "{{ llamacpp_build_dir }}"
        state: absent

- name: Create llamacpp group
  become: true
  ansible.builtin.group:
    name: "{{ llamacpp_group }}"

- name: Create llamacpp user
  become: true
  ansible.builtin.user:
    name: "{{ llamacpp_user }}"
    shell: /bin/false
    system: true
    create_home: true
    home: "{{ llamacpp_home_dir }}"
    state: present
    group: "{{ llamacpp_group }}"

- name: Give llama user permissions
  become: true
  ansible.builtin.user:
    name: "{{ llamacpp_user }}"
    groups: video
    append: true

- name: Create model directory
  become: true
  ansible.builtin.file:
    path: "{{ llamacpp_model_dir }}"
    state: directory
    owner: "{{ llamacpp_user }}"
    group: "{{ llamacpp_group }}"
    mode: "0755"

- name: Download models
  when: llamacpp_models | length > 0
  ansible.builtin.include_tasks: models.yml

- name: Create systemd service
  become: true
  when: not llamacpp_swap_enabled | bool
  ansible.builtin.template:
    src: templates/llama_cpp.service.j2
    dest: /etc/systemd/system/llama-server.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart llama-server

- name: Enable and start llama-server
  become: true
  when: not llamacpp_swap_enabled | bool
  ansible.builtin.systemd_service:
    name: llama-server
    state: started
    enabled: true
    daemon_reload: true

- name: Set up llama-swap multi-model serving
  when: llamacpp_swap_enabled | bool
  ansible.builtin.include_tasks: llama_swap.yml
