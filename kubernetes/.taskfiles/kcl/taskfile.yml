---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
vars:
  KCL_DIR: "{{.ROOT_DIR}}/kubernetes/kcl"
  KCL_APPS_DIR: "{{.ROOT_DIR}}/kubernetes/kcl/apps"

tasks:
  build:
    desc: Build KCL output
    preconditions:
      - which kcl
      - which yq
    cmds:
      - |
        set -euo pipefail
        if [ -n "{{.APP}}" ]; then
          app_list="{{.APP}}"
        else
          app_list=$(find "{{.KCL_APPS_DIR}}" -mindepth 1 -maxdepth 1 -type f -name '*.k' -printf '%f\n' | sed 's/\.k$//' | sort -u)
        fi
        for app in ${app_list}; do
          src="{{.KCL_APPS_DIR}}/${app}.k"
          stream="{{.KCL_APPS_DIR}}/.${app}.stream.tmp.yml"
          if [ ! -f "${src}" ]; then
            echo "ERROR: missing source ${src}" >&2
            exit 1
          fi

          kcl run "${src}" -o "${stream}"
          files=$(yq -N e 'select(.__file != null) | .__file' "${stream}" | sort -u)
          if [ -z "${files}" ]; then
            echo "ERROR: no __file markers found in KCL output for ${app}" >&2
            exit 1
          fi

          for f in ${files}; do
            out="{{.ROOT_DIR}}/${f}"
            mkdir -p "$(dirname "${out}")"
            tmp="${out}.tmp"
            yq e "select(.__file == \"${f}\") | .doc" "${stream}" > "${tmp}"
            {
              echo '---'
              cat "${tmp}"
            } > "${out}"
            rm "${tmp}"
          done

          rm -f "${stream}"
        done

  artifact:
    desc: Build rendered OCI payload
    preconditions:
      - which kcl
      - which yq
    cmds:
      - task: build
      - |
        set -euo pipefail
        out_dir="{{if .OUT_DIR}}{{.OUT_DIR}}{{else}}{{.ROOT_DIR}}/.tmp/kcl-rendered{{end}}"
        rm -rf "${out_dir}"
        mkdir -p "${out_dir}/kubernetes/kcl/apps"

        cp "{{.KCL_APPS_DIR}}/kustomization.yml" "${out_dir}/kubernetes/kcl/apps/kustomization.yml"

        copied=0
        while IFS= read -r src; do
          rel="${src#{{.KCL_APPS_DIR}}/}"
          mkdir -p "${out_dir}/kubernetes/kcl/apps/$(dirname "${rel}")"
          cp "${src}" "${out_dir}/kubernetes/kcl/apps/${rel}"
          copied=$((copied + 1))
        done < <(find "{{.KCL_APPS_DIR}}" -mindepth 3 -maxdepth 3 -type f -path '*/resources/*.yml' | sort)

        if [ "${copied}" -eq 0 ]; then
          echo "ERROR: no rendered files found in {{.KCL_APPS_DIR}}/*/resources/*.yml" >&2
          exit 1
        fi

        copied_components=0
        while IFS= read -r flux_file; do
          base_dir="$(dirname "${flux_file}")"
          while IFS= read -r component; do
            [ -n "${component}" ] || continue
            abs_component="$(realpath -m "${base_dir}/${component}")"
            rel_component="${abs_component#{{.ROOT_DIR}}/}"
            if [ "${rel_component}" = "${abs_component}" ] || [ ! -d "${abs_component}" ]; then
              echo "ERROR: missing component directory ${component} (from ${flux_file})" >&2
              exit 1
            fi
            mkdir -p "${out_dir}/$(dirname "${rel_component}")"
            cp -R "${abs_component}" "${out_dir}/$(dirname "${rel_component}")/"
            copied_components=$((copied_components + 1))
          done < <(yq -r '.spec.components[]?' "${flux_file}")
        done < <(find "{{.KCL_APPS_DIR}}" -mindepth 3 -maxdepth 3 -type f -path '*/resources/flux-kustomization.yml' | sort)

        if [ "${copied_components}" -eq 0 ]; then
          echo "ERROR: no Flux component directories were collected" >&2
          exit 1
        fi

        echo "Rendered artifact at ${out_dir}"
        find "${out_dir}" -mindepth 1 -maxdepth 4 -type d | sort
