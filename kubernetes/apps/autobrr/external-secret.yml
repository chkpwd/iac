---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: autobrr-secret
    template:
      engineVersion: v2
      data:
        AUTOBRR__SESSION_SECRET: "{{ .autobrr_session_secret }}"
  dataFrom:
    - extract:
        key: "autobrr"
