---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app autobrr
  namespace: &ns media
spec:
  targetNamespace: *ns
  path: ./kubernetes/apps/autobrr/
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../core/volsync/components/
  postBuild:
    substitute:
      APP: *app
      CLAIM: config-autobrr-0
      VOLSYNC_PUID: "1999"
      VOLSYNC_PGID: "1999"
      VOLSYNC_CAPACITY: "2Gi"
      VOLSYNC_CACHE_CAPACITY: "5Gi"
  patches:
    - patch: |
        - op: replace
          path: /spec/kopia/retain
          value:
            daily: 14
            weekly: 8
            monthly: 6
      target:
        kind: ReplicationSource
        name: autobrr
  prune: true
  sourceRef:
    kind: GitRepository
    name: chkpwd-ops
    namespace: flux-system
  wait: false
  interval: 30m
