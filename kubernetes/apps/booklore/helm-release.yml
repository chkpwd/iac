# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.5.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: booklore
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
  values:
    controllers:
      booklore:
        enabled: true
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: "${VOLSYNC_CAPACITY}"
              storageClass: ceph-block
              # dataSourceRef:
              #   kind: ReplicationDestination
              #   apiGroup: volsync.backube
              #   name: "${APP}"
              globalMounts: []
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1999
            runAsGroup: 1999
            fsGroup: 1999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        initContainers:
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: "12.2"
            env:
              MARIADB_DATABASE: booklore
              MARIADB_USER: booklore
              MARIADB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore
                    key: DATABASE_PASSWORD
              MARIADB_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore
                    key: DATABASE_ROOT_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - bash
                      - -c
                      - |-
                        mariadb-admin ping --socket=/run/mysqld/mysqld.sock --user=root --password=${MARIADB_ROOT_PASSWORD}
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsUser: 999
              runAsGroup: 999
              seccompProfile: {type: Unconfined}
          wait-for-mariadb:
            image:
              repository: wait4x/wait4x
              tag: 3.6.0
            args:
              - "mysql"
              - "booklore:$(DB_PASSWORD)@tcp(localhost:3306)/booklore"
            env:
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore
                    key: DATABASE_PASSWORD
        containers:
          app:
            image:
              repository: booklore/booklore
              tag: v2.2.1
            command:
              - java
            args:
              - -jar
              - /app/app.jar
            env:
              TZ: "America/New_York"
              DATABASE_URL: "jdbc:mariadb://localhost:3306/booklore"
              DATABASE_USERNAME: "booklore"
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore
                    key: DATABASE_PASSWORD
              BOOKLORE_PORT: &port 6060
              DISK_TYPE: NETWORK
              SWAGGER_ENABLED: "true"
              FORCE_DISABLE_OIDC: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &httpPort 6060
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 700Mi
    service:
      booklore:
        primary: true
        controller: booklore
        ports:
          http:
            port: *port
    route:
      private:
        kind: HTTPRoute
        hostnames: ["{{ .Release.Name }}.chkpwd.com"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: booklore
                port: *port
        parentRefs:
          - name: private
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        existingClaim: config-booklore-0
        advancedMounts:
          booklore:
            app:
              - path: /app/data
                subPath: app
            mariadb:
              - path: /var/lib/mysql
                subPath: mysql
      books:
        type: nfs
        server: "nas-srv-01.chkpwd.com"
        path: /volume1/vault-01/media/books
        advancedMounts:
          booklore:
            app:
              - path: /books
      ingest:
        type: nfs
        server: "nas-srv-01.chkpwd.com"
        path: /volume1/vault-01/media/books/ingest
        advancedMounts:
          booklore:
            app:
              - path: /bookdrop
      mysqld:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          booklore:
            mariadb:
              - path: /run/mysqld
      tmpfs:
        type: emptyDir
        advancedMounts:
          booklore:
            app:
              - path: /tmp
                subPath: app
            mariadb:
              - path: /tmp
                subPath: mysql
