---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: frigate
    template:
      engineVersion: v2
      data:
        FRIGATE_MQTT_USER: "{{ .mqtt_username }}"
        FRIGATE_MQTT_PASSWORD: "{{ .mqtt_password }}"
        FRIGATE_RTSP_PASSWORD: "{{ .rtsp_password }}"
  dataFrom:
    - extract:
        key: "frigate"
