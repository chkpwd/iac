# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.5.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
  values:
    controllers:
      grimmory:
        enabled: true
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: "${VOLSYNC_CAPACITY}"
              storageClass: ceph-block
              dataSourceRef:
                kind: ReplicationDestination
                apiGroup: volsync.backube
                name: "${APP}"
              advancedMounts:
                app:
                  - path: /app/data
                    subPath: app
                mariadb:
                  - path: /var/lib/mysql
                    subPath: mysql
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1999
            runAsGroup: 1999
            fsGroup: 1999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        initContainers:
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2.2-noble
            env:
              MARIADB_USER: grimmory
              MARIADB_DATABASE: grimmory
              MARIADB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory
                    key: database_password
              MARIADB_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory
                    key: database_root_password
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - bash
                      - -c
                      - |-
                        mariadb-admin ping --socket=/run/mysqld/mysqld.sock
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsUser: 999
              runAsGroup: 999
              seccompProfile: {type: Unconfined}
          wait-for-mariadb:
            image:
              repository: wait4x/wait4x
              tag: 3.6.0
            args:
              - "mysql"
              - "grimmory:$(DB_PASSWORD)@tcp(localhost:3306)/grimmory"
            env:
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory
                    key: database_password
        containers:
          app:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v3.0.2
            command:
              - java
            args:
              - -jar
              - /app/app.jar
            env:
              TZ: "America/New_York"
              DATABASE_URL: jdbc:mariadb://localhost:3306/grimmory
              DATABASE_USERNAME: grimmory
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory
                    key: database_password
              FORCE_DISABLE_OIDC: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &httpPort 6060
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 2Gi
    service:
      grimmory:
        primary: true
        controller: grimmory
        ports:
          http:
            port: 6060
    route:
      private:
        kind: HTTPRoute
        hostnames: ["{{ .Release.Name }}.chkpwd.com"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: grimmory
                port: 6060
        parentRefs:
          - name: private
            namespace: networking
            sectionName: https
    persistence:
      books:
        type: nfs
        server: "nas-srv-01.chkpwd.com"
        path: /volume1/vault-01/media/books
        advancedMounts:
          grimmory:
            app:
              - path: /books
      ingest:
        type: nfs
        server: "nas-srv-01.chkpwd.com"
        path: /volume1/vault-01/media/books/ingest
        advancedMounts:
          grimmory:
            app:
              - path: /bookdrop
      mysqld:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          grimmory:
            mariadb:
              - path: /run/mysqld
      tmpfs:
        type: emptyDir
        advancedMounts:
          grimmory:
            app:
              - path: /tmp
                subPath: app
            mariadb:
              - path: /tmp
                subPath: mysql
