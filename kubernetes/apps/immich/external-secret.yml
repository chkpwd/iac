---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-config
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: immich-config
    template:
      engineVersion: v2
      data:
        immich-config.yaml: |
          server:
            externalDomain: https://immich.chkpwd.com
          oauth:
            enabled: true
            issuerUrl: https://authentik.chkpwd.com/application/o/immich/
            clientId: immich
            clientSecret: "{{ .oidc_client_secret }}"
            scope: openid email profile
            signingAlgorithm: RS256
            profileSigningAlgorithm: none
            storageLabelClaim: preferred_username
            buttonText: Login with Authentik
            autoRegister: true
            autoLaunch: false
            mobileOverrideEnabled: false
            mobileRedirectUri: ""
          backup:
            database:
              enabled: false
          newVersionCheck:
            enabled: false
          passwordLogin:
            enabled: false
          storageTemplate:
            enabled: true
            hashVerificationEnabled: true
            template: "{{ `{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}` }}"  # ESO's Go-template gets in the way
  dataFrom:
    - extract:
        key: immich
