---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
  namespace: &ns tools
  labels:
    components.postgres/cpgo: init
spec:
  targetNamespace: *ns
  path: ./kubernetes/apps/immich/
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../core/crunchydata-pgo/components/
  patches:
    # Bootstrap the pgvector extension on the immich database.
    - patch: |
        - op: add
          path: /spec/databaseInitSQL
          value:
            name: immich-init-sql
            key: init.sql
      target:
        kind: PostgresCluster
  postBuild:
    substitute:
      APP: *app
      POSTGRES_DATA_SIZE: 15Gi
    substituteFrom:
      - kind: Secret
        name: cloudflare-id
        optional: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: chkpwd-ops
    namespace: flux-system
  wait: false
  interval: 30m
