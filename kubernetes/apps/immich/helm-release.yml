---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.13.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  values:
    # Shared across the server and machine-learning components.
    controllers:
      main:
        containers:
          main:
            image:
              tag: v3.0.0
            env:
              DB_VECTOR_EXTENSION: pgvector
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-pguser-immich
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-pguser-immich
                    key: user
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-pguser-immich
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-pguser-immich
                    key: dbname
    valkey:
      enabled: true
    immich:
      metrics:
        enabled: false
      persistence:
        library:
          existingClaim: immich-library
      existingConfiguration: immich-config
      configurationKind: Secret
    server:
      enabled: true
      route:
        main:
          hostnames: ["immich.chkpwd.com"]
          parentRefs:
            - name: private
              namespace: networking
              sectionName: https
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 2Gi
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          size: 10Gi
          accessMode: ReadWriteOnce
          storageClass: ceph-block
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 3Gi
