---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helm-release.yml
  - external-secret.yml
  - library-pvc.yml
configMapGenerator:
  - name: immich-init-sql
    files:
      - init.sql=init.sql
generatorOptions:
  disableNameSuffixHash: true
