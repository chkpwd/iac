---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.5.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
  values:
    controllers:
      jellyfin:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: "${VOLSYNC_CAPACITY}"
              storageClass: ceph-block
              dataSourceRef:
                kind: ReplicationDestination
                apiGroup: volsync.backube
                name: "${APP}"
              globalMounts:
                - path: /config
        pod:
          labels:
            egress.home.arpa/custom-egress: "true"
          securityContext:
            runAsUser: 1999
            runAsGroup: &group 1999
            fsGroup: *group
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11
              pullPolicy: IfNotPresent
            env:
              TZ: "America/New_York"
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              JELLYFIN_PublishedServerUrl: https://jellyfin.chkpwd.com
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                gpu.intel.com/i915: 1
                cpu: 200m
                memory: 1Gi
              limits:
                gpu.intel.com/i915: 1
                memory: 8Gi
    service:
      app:
        controller: jellyfin
        annotations:
          lbipam.cilium.io/ips: 10.0.45.37
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
    rawResources:
      deny-403:
        manifest:
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: HTTPRouteFilter
          spec:
            directResponse:
              statusCode: 403
              body:
                type: Inline
                inline: "Forbidden"
      ciliumnetworkpolicy:
        forceRename: jellyfin
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/name: jellyfin
                app.kubernetes.io/instance: jellyfin
            ingress:
              - fromEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: networking
                      gateway.networking.k8s.io/gateway-name: public
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: sonarr
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: suggestarr
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: radarr
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: maintainerr
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: seerr
                toPorts:
                  - ports:
                      - port: "8096"
                        protocol: TCP
              - fromCIDRSet:
                  - cidrGroupRef: media-clients
                toPorts:
                  - ports:
                      - port: "8096"
                        protocol: TCP
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: sonarr
                toPorts:
                  - ports:
                      - port: "8989"
                        protocol: TCP
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: media
                      app.kubernetes.io/name: radarr
                toPorts:
                  - ports:
                      - port: "7878"
                        protocol: TCP
    route:
      private:
        kind: HTTPRoute
        hostnames: ["{{ .Release.Name }}.chkpwd.com"]
        parentRefs:
          - name: public
            namespace: networking
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api-docs
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: gateway.envoyproxy.io
                  kind: HTTPRouteFilter
                  name: deny-403
          - matches:
              - path:
                  type: Exact
                  value: /metrics
              - path:
                  type: Exact
                  value: /health
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: gateway.envoyproxy.io
                  kind: HTTPRouteFilter
                  name: deny-403
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: jellyfin
                namespace: media
                port: 8096
                weight: 1
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  add:
                    - name: Strict-Transport-Security
                      value: "max-age=63072000; includeSubDomains; preload"
                    - name: X-Frame-Options
                      value: "SAMEORIGIN"
                    - name: X-Content-Type-Options
                      value: "nosniff"
                    - name: Referrer-Policy
                      value: "strict-origin-when-cross-origin"
                    - name: Permissions-Policy
                      value: "geolocation=(), microphone=(), camera=()"
    persistence:
      data:
        type: nfs
        server: "nas-srv-01.chkpwd.com"
        path: /volume1/vault-01/media
        globalMounts:
          - path: /data
            readOnly: true
      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
