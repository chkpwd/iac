---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: surmai
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: surmai
    template:
      engineVersion: v2
      data:
        SURMAI_ADMIN_EMAIL: "{{ .admin_email }}"
        SURMAI_ADMIN_PASSWORD: "{{ .admin_password }}"
  dataFrom:
    - extract:
        key: "surmai"
