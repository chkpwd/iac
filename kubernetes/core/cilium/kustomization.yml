---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helm-release.yml
  - pools.yml
  - source.yml
  # bgp.yml is applied separately after bgpControlPlane CRDs are registered
  # - bgp.yml
  # - http-route.yml
  # - policy.yml  # L2 announcements replaced by BGP
configMapGenerator:
  - name: cilium-values
    files:
      - values.yaml=./values.yml
configurations:
  - ./kustomizeconfig.yml
