---
cni:
  exclusive: false
operator:
  rollOutPods: true
  dashboards:
    enabled: true
    annotations:
      grafana_folder: Kubernetes
autoDirectNodeRoutes: true
bpf:
  datapathMode: netkit
  masquerade: true
  preallocateMaps: true
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
dashboards:
  enabled: true
  annotations:
    grafana_folder: Kubernetes
enableIPv4BIGTCP: true
bgpControlPlane:
  enabled: true
endpointRoutes:
  enabled: true
envoy:
  enabled: false
gatewayAPI:
  enabled: false
l2announcements:
  enabled: false
hubble:
  enabled: false
ipam:
  mode: kubernetes
ipv4NativeRoutingCIDR: 10.244.0.0/16
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
loadBalancer:
  acceleration: best-effort
  algorithm: maglev
  mode: dsr
localRedirectPolicies:
  enabled: true
rollOutCiliumPods: true
pmtuDiscovery:
  enabled: true
routingMode: native
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
socketLB:
  enabled: true
  hostNamespaceOnly: true
