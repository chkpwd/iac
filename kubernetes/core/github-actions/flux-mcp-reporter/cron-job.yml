# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: flux-mcp-reporter
  labels:
    app.kubernetes.io/name: flux-mcp-reporter
spec:
  schedule: "0 7 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: flux-mcp-reporter
        spec:
          restartPolicy: Never
          containers:
            - name: reporter
              image: python:3.14-alpine
              command:
                - /bin/sh
                - -c
                - |
                  pip install --quiet --target /tmp/pylibs httpx 2>/dev/null
                  export PYTHONPATH=/tmp/pylibs

                  cat > /tmp/reporter.py << 'SCRIPT'
                  import asyncio
                  import json
                  import os
                  import sys
                  from datetime import datetime, timezone

                  import httpx

                  MCP_URL = "http://flux-operator-mcp.flux-system.svc.cluster.local:9090/sse"

                  MSG_ID = 0


                  def next_id():
                      global MSG_ID
                      MSG_ID += 1
                      return MSG_ID


                  async def read_sse_events(response, stop_after=None):
                      """Yield parsed SSE events from a streaming response."""
                      event_type = None
                      data_buf = ""
                      count = 0
                      async for line in response.aiter_lines():
                          if line.startswith("event:"):
                              event_type = line[len("event:"):].strip()
                          elif line.startswith("data:"):
                              data_buf += line[len("data:"):].strip()
                          elif line.strip() == "" and data_buf:
                              try:
                                  parsed = json.loads(data_buf)
                              except json.JSONDecodeError:
                                  parsed = data_buf
                              yield {"event": event_type, "data": parsed}
                              event_type = None
                              data_buf = ""
                              count += 1
                              if stop_after and count >= stop_after:
                                  return


                  async def mcp_post(client, url, method, params=None):
                      """Send a JSON-RPC request and return the parsed response."""
                      payload = {
                          "jsonrpc": "2.0",
                          "id": next_id(),
                          "method": method,
                      }
                      if params is not None:
                          payload["params"] = params
                      resp = await client.post(url, json=payload)
                      resp.raise_for_status()
                      return resp.json()


                  async def main():
                      report = {
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                          "fluxInstance": None,
                          "helmReleases": None,
                          "kustomizations": None,
                          "errors": [],
                      }

                      async with httpx.AsyncClient(timeout=60) as client:
                          # 1. Open SSE stream to get session URL
                          async with client.stream("GET", MCP_URL) as sse:
                              sse.raise_for_status()

                              session_url = None
                              async for event in read_sse_events(sse, stop_after=1):
                                  if event.get("event") == "endpoint":
                                      endpoint = event["data"]
                                      # The endpoint may be relative; resolve against base
                                      if isinstance(endpoint, str) and endpoint.startswith("/"):
                                          base = MCP_URL.rsplit("/", 1)[0]
                                          session_url = f"{base}{endpoint}"
                                      elif isinstance(endpoint, str):
                                          session_url = endpoint
                                      break

                              if not session_url:
                                  print("ERROR: Could not obtain MCP session URL", file=sys.stderr)
                                  sys.exit(1)

                              # 2. Initialize the MCP session
                              init_resp = await mcp_post(client, session_url, "initialize", {
                                  "protocolVersion": "2024-11-05",
                                  "capabilities": {},
                                  "clientInfo": {"name": "flux-reporter", "version": "1.0.0"},
                              })

                              if "error" in init_resp:
                                  print(f"ERROR: MCP init failed: {init_resp['error']}", file=sys.stderr)
                                  sys.exit(1)

                              # Send initialized notification
                              await client.post(session_url, json={
                                  "jsonrpc": "2.0",
                                  "method": "notifications/initialized",
                              })

                              # 3. Call get_flux_instance for the overview/report
                              try:
                                  result = await mcp_post(client, session_url, "tools/call", {
                                      "name": "get_flux_instance",
                                      "arguments": {},
                                  })
                                  if "result" in result:
                                      report["fluxInstance"] = result["result"]
                                  elif "error" in result:
                                      report["errors"].append(f"get_flux_instance: {result['error']}")
                              except Exception as exc:
                                  report["errors"].append(f"get_flux_instance: {exc}")

                              # 4. Get HelmReleases via get_kubernetes_resources
                              try:
                                  result = await mcp_post(client, session_url, "tools/call", {
                                      "name": "get_kubernetes_resources",
                                      "arguments": {
                                          "apiVersion": "helm.toolkit.fluxcd.io/v2",
                                          "kind": "HelmRelease",
                                      },
                                  })
                                  if "result" in result:
                                      report["helmReleases"] = result["result"]
                                  elif "error" in result:
                                      report["errors"].append(f"helmreleases: {result['error']}")
                              except Exception as exc:
                                  report["errors"].append(f"helmreleases: {exc}")

                              # 5. Get Kustomizations via get_kubernetes_resources
                              try:
                                  result = await mcp_post(client, session_url, "tools/call", {
                                      "name": "get_kubernetes_resources",
                                      "arguments": {
                                          "apiVersion": "kustomize.toolkit.fluxcd.io/v1",
                                          "kind": "Kustomization",
                                      },
                                  })
                                  if "result" in result:
                                      report["kustomizations"] = result["result"]
                                  elif "error" in result:
                                      report["errors"].append(f"kustomizations: {result['error']}")
                              except Exception as exc:
                                  report["errors"].append(f"kustomizations: {exc}")

                      # 6. Send report
                      webhook_url = os.environ.get("WEBHOOK_URL", "")
                      if webhook_url:
                          async with httpx.AsyncClient(timeout=15) as client:
                              resp = await client.post(
                                  webhook_url,
                                  content=json.dumps(report),
                                  headers={"Content-Type": "application/json"},
                              )
                              if resp.is_error:
                                  print(
                                      f"Webhook failed: {resp.status_code} {resp.text}",
                                      file=sys.stderr,
                                  )
                                  sys.exit(1)
                              print("Report sent to webhook successfully")
                      else:
                          print(json.dumps(report, indent=2))


                  asyncio.run(main())
                  SCRIPT

                  python /tmp/reporter.py
              env:
                - name: WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: flux-mcp-reporter-webhook
                      key: url
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 256Mi
