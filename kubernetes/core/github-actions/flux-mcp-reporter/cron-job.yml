# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: flux-mcp-reporter
  labels:
    app.kubernetes.io/name: flux-mcp-reporter
spec:
  schedule: "0 7 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: flux-mcp-reporter
        spec:
          restartPolicy: Never
          containers:
            - name: reporter
              image: python:3.14-alpine
              command:
                - /bin/sh
                - -c
                - |
                  pip install --quiet --target /tmp/pylibs httpx 2>/dev/null
                  export PYTHONPATH=/tmp/pylibs

                  cat > /tmp/reporter.py << 'SCRIPT'
                  import asyncio
                  import json
                  import os
                  import sys
                  from datetime import datetime, timezone

                  import httpx

                  MCP_URL = "http://flux-operator-mcp.flux-system.svc.cluster.local:9090/mcp"
                  SESSION_ID = None
                  MSG_ID = 0


                  def next_id():
                      global MSG_ID
                      MSG_ID += 1
                      return MSG_ID


                  async def mcp_request(client, url, method, params=None, notification=False):
                      global SESSION_ID
                      payload = {"jsonrpc": "2.0", "method": method}
                      if not notification:
                          payload["id"] = next_id()
                      if params is not None:
                          payload["params"] = params
                      headers = {"Accept": "application/json, text/event-stream"}
                      if SESSION_ID:
                          headers["Mcp-Session-Id"] = SESSION_ID
                      resp = await client.post(url, json=payload, headers=headers)
                      new_session = resp.headers.get("mcp-session-id")
                      if new_session:
                          SESSION_ID = new_session
                      if notification:
                          return None
                      resp.raise_for_status()
                      data = resp.text
                      for line in data.split("\n"):
                          if line.startswith("data:"):
                              return json.loads(line[5:])
                      return {}


                  async def main():
                      report = {
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                          "fluxInstance": None,
                          "helmReleases": None,
                          "kustomizations": None,
                          "errors": [],
                      }

                      async with httpx.AsyncClient(timeout=60) as client:
                          init_resp = await mcp_request(client, MCP_URL, "initialize", {
                              "protocolVersion": "2024-11-05",
                              "capabilities": {},
                              "clientInfo": {"name": "flux-reporter", "version": "1.0.0"},
                          })

                          if "error" in init_resp:
                              print(f"ERROR: MCP init failed: {init_resp['error']}", file=sys.stderr)
                              sys.exit(1)

                          await mcp_request(client, MCP_URL, "notifications/initialized", notification=True)

                          try:
                              result = await mcp_request(client, MCP_URL, "tools/call", {
                                  "name": "get_flux_instance",
                                  "arguments": {},
                              })
                              if "result" in result:
                                  report["fluxInstance"] = result["result"]
                              elif "error" in result:
                                  report["errors"].append(f"get_flux_instance: {result['error']}")
                          except Exception as exc:
                              report["errors"].append(f"get_flux_instance: {exc}")

                          try:
                              result = await mcp_request(client, MCP_URL, "tools/call", {
                                  "name": "get_kubernetes_resources",
                                  "arguments": {
                                      "apiVersion": "helm.toolkit.fluxcd.io/v2",
                                      "kind": "HelmRelease",
                                  },
                              })
                              if "result" in result:
                                  report["helmReleases"] = result["result"]
                              elif "error" in result:
                                  report["errors"].append(f"helmreleases: {result['error']}")
                          except Exception as exc:
                              report["errors"].append(f"helmreleases: {exc}")

                          try:
                              result = await mcp_request(client, MCP_URL, "tools/call", {
                                  "name": "get_kubernetes_resources",
                                  "arguments": {
                                      "apiVersion": "kustomize.toolkit.fluxcd.io/v1",
                                      "kind": "Kustomization",
                                  },
                              })
                              if "result" in result:
                                  report["kustomizations"] = result["result"]
                              elif "error" in result:
                                  report["errors"].append(f"kustomizations: {result['error']}")
                          except Exception as exc:
                              report["errors"].append(f"kustomizations: {exc}")

                      webhook_url = os.environ.get("WEBHOOK_URL", "")
                      if webhook_url:
                          async with httpx.AsyncClient(timeout=15) as client:
                              resp = await client.post(
                                  webhook_url,
                                  content=json.dumps(report),
                                  headers={"Content-Type": "application/json"},
                              )
                              if resp.is_error:
                                  print(
                                      f"Webhook failed: {resp.status_code} {resp.text}",
                                      file=sys.stderr,
                                  )
                                  sys.exit(1)
                              print("Report sent to webhook successfully")
                      else:
                          print(json.dumps(report, indent=2))


                  asyncio.run(main())
                  SCRIPT

                  python /tmp/reporter.py
              env:
                - name: WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: flux-mcp-reporter-webhook
                      key: url
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 256Mi
