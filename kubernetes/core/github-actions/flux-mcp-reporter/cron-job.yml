# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: flux-mcp-reporter
  labels:
    app.kubernetes.io/name: flux-mcp-reporter
spec:
  schedule: "0 7 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: flux-mcp-reporter
        spec:
          restartPolicy: Never
          containers:
            - name: reporter
              image: python:3.12-alpine
              command:
                - /bin/sh
                - -c
                - |
                  pip install --quiet httpx-sse httpx 2>/dev/null

                  cat > /tmp/reporter.py << 'SCRIPT'
                  import asyncio
                  import json
                  import os
                  import sys
                  from datetime import datetime, timezone

                  import httpx


                  SSE_URL = "https://flux-operator-mcp.chkpwd.com/sse"

                  TOOLS = [
                      "get_flux_instance",
                      "list_flux_helmreleases",
                      "list_flux_kustomizations",
                      "list_flux_resourcesets",
                  ]

                  REPORT_KEYS = {
                      "get_flux_instance": "fluxInstance",
                      "list_flux_helmreleases": "helmReleases",
                      "list_flux_kustomizations": "kustomizations",
                      "list_flux_resourcesets": "resourcesets",
                  }


                  async def read_sse_event(response):
                      """Read a single SSE event from the stream and return parsed JSON."""
                      event_data = {}
                      async for line in response.aiter_lines():
                          line = line.strip()
                          if line.startswith("event:"):
                              event_data["event"] = line[len("event:"):].strip()
                          elif line.startswith("data:"):
                              raw = line[len("data:"):].strip()
                              try:
                                  event_data["data"] = json.loads(raw)
                              except json.JSONDecodeError:
                                  event_data["data"] = raw
                          elif line == "" and event_data:
                              return event_data
                      return event_data


                  async def call_tool(client, session_url, tool_name, msg_id):
                      """Send a JSON-RPC tools/call request and return the result."""
                      payload = {
                          "jsonrpc": "2.0",
                          "id": msg_id,
                          "method": "tools/call",
                          "params": {
                              "name": tool_name,
                              "arguments": {},
                          },
                      }
                      resp = await client.post(session_url, json=payload)
                      resp.raise_for_status()
                      return resp.json()


                  async def main():
                      report = {
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                          "fluxInstance": None,
                          "helmReleases": [],
                          "kustomizations": [],
                          "resourcesets": [],
                          "errors": [],
                      }

                      async with httpx.AsyncClient(timeout=30) as client:
                          # Open SSE connection and grab the session endpoint
                          async with client.stream("GET", SSE_URL) as sse_resp:
                              sse_resp.raise_for_status()

                              session_url = None
                              async for line in sse_resp.aiter_lines():
                                  line = line.strip()
                                  if line.startswith("data:"):
                                      session_url = line[len("data:"):].strip()
                                      break

                              if not session_url:
                                  print("ERROR: Could not obtain MCP session URL", file=sys.stderr)
                                  sys.exit(1)

                              # Call each tool sequentially
                              for idx, tool in enumerate(TOOLS, start=1):
                                  try:
                                      result = await call_tool(client, session_url, tool, idx)
                                      key = REPORT_KEYS[tool]
                                      report[key] = result.get("result")
                                  except Exception as exc:
                                      report["errors"].append(f"{tool}: {exc}")

                      webhook_url = os.environ.get("WEBHOOK_URL", "")
                      if webhook_url:
                          async with httpx.AsyncClient(timeout=15) as client:
                              resp = await client.post(
                                  webhook_url,
                                  content=json.dumps(report),
                                  headers={"Content-Type": "application/json"},
                              )
                              if resp.is_error:
                                  print(
                                      f"Webhook failed: {resp.status_code} {resp.text}",
                                      file=sys.stderr,
                                  )
                                  sys.exit(1)
                              print("Webhook sent successfully")
                      else:
                          print(json.dumps(report, indent=2))


                  asyncio.run(main())
                  SCRIPT

                  python /tmp/reporter.py
              env:
                - name: WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: flux-mcp-reporter-webhook
                      key: url
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop:
                    - ALL
