---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${APP}-nfs-probe
  labels:
    app.kubernetes.io/part-of: nfs-scalers
spec:
  minReplicas: 0
  maxReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: ${HPA_KIND:=StatefulSet}
    name: ${APP}
  metrics:
    - type: External
      external:
        metric:
          name: probe_success
          selector:
            matchLabels:
              instance: nas-srv-01.chkpwd.com:2049
              job: probe/monitoring/tcp-endpoints
        target:
          type: Value
          value: "1"
  behavior:
    scaleDown:
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
      stabilizationWindowSeconds: 0
    scaleUp:
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
      stabilizationWindowSeconds: 0
