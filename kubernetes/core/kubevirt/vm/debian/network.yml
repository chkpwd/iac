---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan30-bridge
spec:
  # macvlan (bridge mode) on the VLAN 30 subinterface -> VM sits directly on
  # 10.0.30.0/24. IPAM is left empty so the guest OS DHCPs from the LAN server
  # (KubeVirt bridge binding does not run DHCP for secondary networks).
  config: |-
    {
      "cniVersion": "1.1.0",
      "name": "vlan30-bridge",
      "plugins": [
        {
          "type": "macvlan",
          "master": "enp0s31f6.30",
          "mode": "bridge",
          "ipam": {}
        }
      ]
    }
