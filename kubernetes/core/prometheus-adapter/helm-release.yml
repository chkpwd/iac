---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus-adapter
  driftDetection:
    mode: disabled
  values:
    prometheus:
      url: http://prometheus-operated.monitoring.svc.cluster.local
      port: 9090
    rules:
      default: false
      external:
        - seriesQuery: '{__name__="probe_success"}'
          resources:
            namespaced: false
          name:
            as: probe_success
          metricsQuery: max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])
