---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  timeout: 15m
  dependsOn:
    - name: rook-ceph-operator
      namespace: rook-ceph
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          priorityClassName: system-cluster-critical
          hostNetwork: true
          replicas: 2
        nodePlugin:
          priorityClassName: system-node-critical
          imagePullPolicy: IfNotPresent
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
      cephfs:
        enabled: false
        name: rook-ceph.cephfs.csi.ceph.com
      nfs:
        enabled: false
        name: rook-ceph.nfs.csi.ceph.com
      nvmeof:
        enabled: false
        name: rook-ceph.nvmeof.csi.ceph.com
