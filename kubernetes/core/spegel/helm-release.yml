---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  interval: 1h
  chart:
    spec:
      chart: spegel
      version: 0.2.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: spegel
  valuesFrom:
    - kind: ConfigMap
      name: spegel-values
