---
# yaml-language-server: $schema=https://chkpwd.github.io/iac/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}"
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: "${APP}-volsync"
    copyMethod: Snapshot
    volumeSnapshotClassName: csi-ceph-blockpool
    cacheStorageClassName: ceph-block
    storageClassName: ceph-block
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=4Gi}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]
    accessModes: ["${VOLSYNC_ACCESSMODES:=ReadWriteOnce}"]
    capacity: "${VOLSYNC_CAPACITY}"
    sourceIdentity:
      sourceName: ${APP}
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            path: /volume1/vault-01/backups/kubernetes/volsync/kopia
            server: nas-srv-01.chkpwd.com
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=100}
      fsGroup: ${VOLSYNC_PGID:=100}
    enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true
