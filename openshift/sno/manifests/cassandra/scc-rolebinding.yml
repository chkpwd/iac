# Grant nonroot-v2 SCC to the default service account in the cassandra namespace.
# Required because the official cassandra:4.1 image runs as UID 999 (cassandra user).
#
# Apply with:
#   oc adm policy add-scc-to-user nonroot-v2 -z default -n cassandra
#
# This file documents the binding for reference. The `oc adm policy` command
# creates a ClusterRoleBinding automatically; this RoleBinding achieves the
# same result scoped to the namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cassandra-scc-nonroot-v2
  namespace: cassandra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: default
    namespace: cassandra
